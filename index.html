<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Issue Tracker</title>

    <!-- Daisy Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>
    <section class="bg-base-200 py-16">
        <div class="w-4/12 h-full mx-auto">
            <fieldset class="fieldset bg-white rounded-box p-4">
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold mx-auto">GitHub Issues Tracker</h2>

                <label class="label mx-auto mb-6">Sign in to manage your issues</label>
                <h4 class="font-medium">Username</h4>
                <input type="text" class="input w-full " placeholder="Enter Username" />
                <p class="text-violet-600 mb-4">Default: admin</p>

                <h4 class="font-medium">Password</h4>
                <input type="text" class="input w-full" placeholder="Enter Password" />
                <p class="text-violet-600 mb-6">Default: admin123</p>
                <button class="btn btn-primary">Sign In</button>

                <p class="text-center">OR</p>
                <p class="text-xs text-gray-500 text-center">Demo Credentials:</p>
                <div class="bg-base-200 text-center py-6 mx-6">
                    <p>
                        <span class="font-medium">Username:</span> admin
                    </p>
                    <p>
                        <span class="font-medium">Password:</span> admin123
                    </p>
                </div>
            </fieldset>
        </div>
    </section>

    <nav class="px-[80px]">
        <div class="navbar bg-base-100 shadow-sm flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <div class="w-10 rounded-full">
                    <img src="./assets/github-logo.png" />
                </div>
                <h2 class="font-bold TEXT-LG">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-4">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
        </div>
    </nav>

    <section class="bg-base-200 pt-16">
        <div class="btn-container w-9/11 bg-white mx-auto flex gap-3 p-6 rounded">
            <button class="btn btn-outline btn-primary py-3 px-14">All</button>
            <button class="btn btn-outline btn-primary py-3 px-14">Open</button>
            <button class="btn btn-outline btn-primary py-3 px-14">Closed</button>
        </div>
    </section>

</body>

</html>
