<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Issue Tracker</title>

    <!-- Daisy Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>
    <section id="login-container" class="bg-gray-100 p-4">
        <fieldset class="fieldset bg-white rounded-box p-4 w-full h-full mx-auto md:w-4/12">
            <img class="mx-auto my-7" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl font-bold mx-auto">GitHub Issues Tracker</h2>

            <label class="label mx-auto mb-6">Sign in to manage your issues</label>
            <h4 class="font-medium">Username</h4>
            <input type="text" id="name" class="input w-full" placeholder="Enter Username" />
            <p class="text-violet-600 mb-4">Default: admin</p>

            <h4 class="font-medium">Password</h4>
            <input type="password" id="pass" class="input w-full" placeholder="Enter Password" />
            <p class="text-violet-600 mb-6">Default: admin123</p>
            <button id="sign-in-btn" class="btn btn-primary">Sign In</button>

            <p class="text-center">OR</p>
            <p class="text-xs text-gray-500 text-center">Demo Credentials:</p>
            <div class="bg-gray-100 text-center py-6 mx-6 rounded">
                <p>
                    <span class="font-medium">Username:</span> admin
                </p>
                <p>
                    <span class="font-medium">Password:</span> admin123
                </p>
            </div>
        </fieldset>
    </section>
    <div id="load-spinner" class="h-screen flex justify-center items-center hidden bg-white">
        <span class="loading loading-infinity loading-xl"></span>
    </div>

    
<script src="./script/login.js"></script>
</body>

</html>
